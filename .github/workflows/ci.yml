name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  ZKF_ALLOW_DEV_DETERMINISTIC_GROTH16: "1"

jobs:
  quality:
    name: quality
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - ziros
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Rust toolchain
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Build release
        run: ./zkf-build.sh --release

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Python tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

  rust_tests:
    name: rust tests / ${{ matrix.shard }}
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - ziros
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shard:
          - foundations
          - runtime
          - apps
          - backends_core
          - backends_recursive
          - cli
          - integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Rust toolchain
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Run Rust test shard
        run: ./scripts/ci/run_rust_test_shard.sh "${{ matrix.shard }}"

  operational:
    name: operational checks
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - ziros
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Rust toolchain
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Build release CLI
        run: ./zkf-build.sh --release -p zkf-cli

      - name: Audit built-in examples
        run: make audit

      - name: Conformance
        run: ./scripts/run_conformance_suite.sh

      - name: Doctor
        run: ./target-local/release/zkf-cli doctor

      - name: Metal diagnostics
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            ./target-local/release/zkf-cli metal-doctor
          else
            echo "Non-Apple-Silicon macOS runner detected; skipping Metal-specific diagnostics."
          fi

  ci:
    name: ci
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - ziros
    if: always()
    needs:
      - quality
      - rust_tests
      - operational
    steps:
      - name: Evaluate required checks
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          RUST_TESTS_RESULT: ${{ needs.rust_tests.result }}
          OPERATIONAL_RESULT: ${{ needs.operational.result }}
        run: |
          echo "quality=${QUALITY_RESULT}"
          echo "rust_tests=${RUST_TESTS_RESULT}"
          echo "operational=${OPERATIONAL_RESULT}"

          for result in "$QUALITY_RESULT" "$RUST_TESTS_RESULT" "$OPERATIONAL_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "required job failed: ${result}" >&2
              exit 1
            fi
          done
