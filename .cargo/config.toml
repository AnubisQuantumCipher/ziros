[alias]
zkf = "run -p zkf-cli --features metal-gpu --"
zkf-bench = "run -p zkf-cli --features metal-gpu -- benchmark"
zkf-metal-doctor = "run -p zkf-cli --features metal-gpu -- metal-doctor"
zkf-test-metal = "test --features zkf-cli/metal-gpu"

[build]
target-dir = "target-local"

[env]
RUST_TEST_THREADS = "1"
MallocSpaceEfficient = "1"
MallocMaxMagazines = "1"
MACOSX_DEPLOYMENT_TARGET = "26.2"

[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]
