[package]
name = "p3-merkle-tree"
version = "0.4.2"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Vendored p3-merkle-tree with public MerkleTree constructor for GPU-accelerated digest computation."

[lib]
name = "p3_merkle_tree"
path = "src/lib.rs"

[dependencies]
itertools = { version = "0.14.0", features = ["use_alloc"], default-features = false }
p3-commit = "=0.4.2"
p3-field = "=0.4.2"
p3-matrix = "=0.4.2"
p3-maybe-rayon = "=0.4.2"
p3-symmetric = "=0.4.2"
p3-util = "=0.4.2"
rand = { version = "0.9.0", features = ["small_rng"], default-features = false }
serde = { version = "1.0", features = ["alloc"], default-features = false }
thiserror = { version = "2.0", default-features = false }
tracing = { version = "0.1.37", features = ["attributes"], default-features = false }

[lints.clippy]
cognitive_complexity = "allow"
too_long_first_doc_paragraph = "allow"
transmute_undefined_repr = "allow"
tuple_array_conversions = "allow"
unused_peekable = "allow"
