[package]
name = "zkf-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
zkf-backends = { path = "../zkf-backends", optional = true }
zkf-core = { path = "../zkf-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
num-bigint = { workspace = true }
sha2 = { workspace = true }
log = "0.4"
tempfile = "3"
ed25519-dalek = "2"

# Optional: CPU backend math (arkworks + plonky3)
ark-bn254 = { workspace = true, optional = true }
ark-ec = { workspace = true, optional = true }
ark-ff = { workspace = true, optional = true }
ark-poly = { workspace = true, optional = true }
ark-serialize = { workspace = true, optional = true }
p3-field = { workspace = true, optional = true }
p3-goldilocks = { workspace = true, optional = true }
p3-baby-bear = { workspace = true, optional = true }
p3-dft = { workspace = true, optional = true }
p3-matrix = { workspace = true, optional = true }
p3-symmetric = { workspace = true, optional = true }
rand09 = { workspace = true, optional = true }

[target.'cfg(hax)'.dependencies]
hax-lib = { git = "https://github.com/cryspen/hax", rev = "1f0259212fa994fb351853026397042c497d07b9" }

[dev-dependencies]
proptest.workspace = true

[features]
default = ["full"]
full = ["dep:zkf-backends", "cpu-backends"]
kani-minimal = []
neural-engine = []
cpu-backends = [
    "dep:ark-bn254",
    "dep:ark-ec",
    "dep:ark-ff",
    "dep:ark-poly",
    "dep:ark-serialize",
    "dep:p3-field",
    "dep:p3-goldilocks",
    "dep:p3-baby-bear",
    "dep:p3-dft",
    "dep:p3-matrix",
    "dep:p3-symmetric",
    "dep:rand09",
]

[target.'cfg(target_vendor = "apple")'.dependencies]
objc2 = "=0.6.4"
objc2-foundation = { version = "=0.3.2", features = ["NSArray", "NSDictionary", "NSError", "NSObject", "NSString", "NSURL", "NSValue"] }
objc2-core-ml = { version = "=0.3.2", features = ["MLDictionaryFeatureProvider", "MLFeatureProvider", "MLFeatureValue", "MLModel", "MLModelConfiguration", "MLModel_MLModelCompilation", "MLMultiArray"] }
objc2-metal = { version = "0.3", features = ["MTLBuffer", "MTLResource", "MTLTypes"] }
zkf-metal = { path = "../zkf-metal" }
halo2curves = { version = "0.9.0", features = ["std", "bits", "derive_serde"] }
tiny-keccak = { version = "2", features = ["keccak"] }
