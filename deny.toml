# cargo-deny configuration
# Run: cargo deny check

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "BSL-1.1",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "BlueOak-1.0.0",
]
copyleft = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = [
    "https://github.com/noir-lang/noir",
    "https://github.com/privacy-scaling-explorations/halo2",
]
