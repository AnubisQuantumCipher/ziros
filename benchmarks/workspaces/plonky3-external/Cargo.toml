[package]
name = "plonky3-external-runner"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
p3-air = "=0.4.2"
p3-baby-bear = "=0.4.2"
p3-challenger = "=0.4.2"
p3-commit = "=0.4.2"
p3-dft = "=0.4.2"
p3-field = "=0.4.2"
p3-fri = "=0.4.2"
p3-keccak = "=0.4.2"
p3-matrix = "=0.4.2"
p3-merkle-tree = "=0.4.2"
p3-poseidon2 = "=0.4.2"
p3-symmetric = "=0.4.2"
p3-uni-stark = "=0.4.2"
postcard = { version = "1.1", features = ["alloc"] }
rand = { version = "0.9", features = ["small_rng"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
