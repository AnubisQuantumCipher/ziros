[package]
name = "risc0-workload-runner"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[package.metadata.risc0]
methods = ["guest"]

[workspace]
members = ["guest"]

[dependencies]
bincode = "1.3"
clap = { version = "4.5", features = ["derive"] }
risc0-zkvm = { version = "2.3.2", default-features = false, features = ["prove"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
risc0-build = "2.3.2"
